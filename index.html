<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XAU/USD — Gold Price Tracker</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a1f26;
    --border: #222a33;
    --text: #e6e6e6;
    --muted: #8a94a3;
    --gold: #d4af37;
    --gold-soft: #f1d17a;
    --up: #1dd1a1;
    --down: #ff5c5c;
    --mono: "SFMono-Regular", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #1b1f26 0%, var(--bg) 60%) fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }

  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 12px var(--gold);
  }

  .brand-name {
    font-family: var(--mono);
    letter-spacing: 2px;
    color: var(--gold-soft);
    font-size: 13px;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .status.live .status-dot {
    background: var(--up);
    box-shadow: 0 0 8px var(--up);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .status.error .status-dot {
    background: var(--down);
    box-shadow: 0 0 8px var(--down);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }

  .ticker {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .symbol {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 2px;
  }

  .unit {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .price {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1.05;
    letter-spacing: -1px;
    margin: 8px 0 4px;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
    font-variant-numeric: tabular-nums;
    transition: color 180ms ease;
  }

  .price.flash-up { animation: flashUp 600ms ease; }
  .price.flash-down { animation: flashDown 600ms ease; }

  @keyframes flashUp {
    0% { color: var(--up); text-shadow: 0 0 30px rgba(29, 209, 161, 0.45); }
    100% { color: var(--gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.25); }
  }

  @keyframes flashDown {
    0% { color: var(--down); text-shadow: 0 0 30px rgba(255, 92, 92, 0.45); }
    100% { color: var(--gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.25); }
  }

  .change-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 16px;
    margin-top: 8px;
  }

  .change {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(138, 148, 163, 0.12);
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .change.up {
    background: rgba(29, 209, 161, 0.12);
    color: var(--up);
  }

  .change.down {
    background: rgba(255, 92, 92, 0.12);
    color: var(--down);
  }

  .arrow { font-size: 14px; }

  .meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .error-banner {
    margin-top: 20px;
    padding: 12px 16px;
    background: rgba(255, 92, 92, 0.08);
    border: 1px solid rgba(255, 92, 92, 0.25);
    border-radius: 8px;
    color: var(--down);
    font-family: var(--mono);
    font-size: 13px;
    display: none;
  }

  .error-banner.visible { display: block; }

  footer {
    margin-top: 24px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @media (max-width: 520px) {
    .wrap { padding: 24px 16px; }
    .panel { padding: 28px 22px 22px; }
    .price { font-size: 52px; }
    .meta { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">Gold Terminal</div>
      </div>
      <div class="status" id="status">
        <div class="status-dot"></div>
        <span id="status-text">Connecting</span>
      </div>
    </header>

    <div class="panel">
      <div class="ticker">
        <span class="symbol">XAU / USD</span>
        <span class="unit">USD per troy ounce</span>
      </div>

      <div class="price" id="price">—</div>

      <div class="change-row">
        <span class="change" id="change">
          <span class="arrow" id="arrow">•</span>
          <span id="change-value">0.00</span>
          <span id="change-pct">(0.00%)</span>
        </span>
        <span style="color: var(--muted); font-size: 12px;">since page load</span>
      </div>

      <div class="error-banner" id="error-banner"></div>

      <div class="meta">
        <div class="meta-item">
          <span class="meta-label">Last Updated</span>
          <span class="meta-value" id="updated">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Next Refresh</span>
          <span class="meta-value" id="countdown">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Session Open</span>
          <span class="meta-value" id="open-price">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Source</span>
          <span class="meta-value" id="source">gold-api.com</span>
        </div>
      </div>
    </div>

    <footer>Auto-refreshing every 30 seconds • Not financial advice</footer>
  </div>

<script>
(function () {
  const REFRESH_MS = 30000;
  const API_URL = "https://api.gold-api.com/price/XAU";

  const el = {
    price: document.getElementById("price"),
    change: document.getElementById("change"),
    changeValue: document.getElementById("change-value"),
    changePct: document.getElementById("change-pct"),
    arrow: document.getElementById("arrow"),
    updated: document.getElementById("updated"),
    countdown: document.getElementById("countdown"),
    openPrice: document.getElementById("open-price"),
    status: document.getElementById("status"),
    statusText: document.getElementById("status-text"),
    errorBanner: document.getElementById("error-banner"),
  };

  let lastPrice = null;
  let sessionOpen = null;
  let nextRefreshAt = 0;
  let countdownTimer = null;

  const fmtPrice = (n) =>
    n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const fmtTime = (d) =>
    d.toLocaleTimeString("en-US", { hour12: false });

  function setStatus(state, text) {
    el.status.classList.remove("live", "error");
    if (state) el.status.classList.add(state);
    el.statusText.textContent = text;
  }

  function showError(msg) {
    el.errorBanner.textContent = "⚠ " + msg;
    el.errorBanner.classList.add("visible");
    setStatus("error", "Error");
  }

  function clearError() {
    el.errorBanner.classList.remove("visible");
  }

  function updateChange(current) {
    if (sessionOpen === null) {
      el.change.classList.remove("up", "down");
      el.arrow.textContent = "•";
      el.changeValue.textContent = "0.00";
      el.changePct.textContent = "(0.00%)";
      return;
    }
    const diff = current - sessionOpen;
    const pct = (diff / sessionOpen) * 100;
    const sign = diff >= 0 ? "+" : "−";
    el.changeValue.textContent = sign + fmtPrice(Math.abs(diff));
    el.changePct.textContent = "(" + sign + Math.abs(pct).toFixed(2) + "%)";

    el.change.classList.remove("up", "down");
    if (diff > 0) {
      el.change.classList.add("up");
      el.arrow.textContent = "▲";
    } else if (diff < 0) {
      el.change.classList.add("down");
      el.arrow.textContent = "▼";
    } else {
      el.arrow.textContent = "•";
    }
  }

  function flashPrice(newPrice) {
    if (lastPrice === null) return;
    el.price.classList.remove("flash-up", "flash-down");
    void el.price.offsetWidth;
    if (newPrice > lastPrice) el.price.classList.add("flash-up");
    else if (newPrice < lastPrice) el.price.classList.add("flash-down");
  }

  async function fetchPrice() {
    setStatus("live", "Fetching");
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(API_URL, { signal: controller.signal, cache: "no-store" });
      clearTimeout(timeout);

      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const price = Number(data.price);
      if (!isFinite(price) || price <= 0) throw new Error("Invalid price data");

      if (sessionOpen === null) {
        sessionOpen = price;
        el.openPrice.textContent = "$" + fmtPrice(sessionOpen);
      }

      flashPrice(price);
      el.price.textContent = "$" + fmtPrice(price);
      lastPrice = price;

      const now = new Date();
      el.updated.textContent = fmtTime(now);

      updateChange(price);
      clearError();
      setStatus("live", "Live");
    } catch (err) {
      const msg = err.name === "AbortError"
        ? "Request timed out"
        : "Failed to fetch price: " + err.message;
      showError(msg);
    } finally {
      nextRefreshAt = Date.now() + REFRESH_MS;
    }
  }

  function tickCountdown() {
    const remaining = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
    el.countdown.textContent = remaining + "s";
  }

  async function loop() {
    await fetchPrice();
    setTimeout(loop, REFRESH_MS);
  }

  countdownTimer = setInterval(tickCountdown, 250);
  loop();
})();
</script>
</body>
</html>
